<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Borrower Portal | AskJuthis</title>
    <meta name="description"
        content="Secure borrower portal for managing your mortgage application, uploading documents, and tracking progress.">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0F1E2E',
                            gold: '#D3BD73',
                            slate: '#4A5D73',
                            warm: '#F4F1EE'
                        },
                        "error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#3a485a",
                        "tertiary-fixed-dim": "#b4c8e2",
                        "outline": "#74777d",
                        "on-error-container": "#93000a",
                        "secondary-fixed-dim": "#dcc57a",
                        "background": "#f8f9fa",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e7e8e9",
                        "tertiary-fixed": "#d0e4ff",
                        "surface-variant": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "inverse-primary": "#b9c8dd",
                        "primary": "#0F1E2E",
                        "on-primary-fixed": "#0d1c2c",
                        "surface": "#f8f9fa",
                        "on-tertiary-container": "#73879e",
                        "surface-container-highest": "#e1e3e4",
                        "tertiary-container": "#091e31",
                        "on-surface-variant": "#44474c",
                        "on-primary-container": "#78869a",
                        "surface-dim": "#d9dadb",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed": "#D3BD73",
                        "error": "#ba1a1a",
                        "surface-tint": "#516072",
                        "on-tertiary-fixed": "#071d30",
                        "primary-container": "#4A5D73",
                        "on-secondary-container": "#726121",
                        "on-tertiary-fixed-variant": "#35485d",
                        "on-error": "#ffffff",
                        "secondary": "#6e5d1d",
                        "outline-variant": "#c4c6cc",
                        "primary-fixed-dim": "#b9c8dd",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "on-primary": "#ffffff",
                        "on-background": "#191c1d",
                        "secondary-container": "#f6df91",
                        "inverse-on-surface": "#f0f1f2",
                        "primary-fixed": "#d5e4fa",

                        "on-secondary": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "tertiary": "#000308",
                        "on-secondary-fixed-variant": "#554505"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "sans": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                }
            }
        }
    </script>

    <!-- Third-party SDKs (deferred) -->
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js" defer></script>
    <script src="https://cdn.withpersona.com/dist/persona-v4.9.0.js" defer></script>
    <script src="/socket.io/socket.io.js" defer></script>

    <!-- Fonts: Manrope, Inter & Pinyon Script -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Shared CSS -->
    <link rel="stylesheet" href="style.css?v=1.0.5">
</head>

<body class="font-sans text-white bg-primary min-h-screen">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-primary/95  border-b border-white/10">
        <div class="px-4 sm:px-8 lg:px-12">
            <div class="flex h-20 items-center justify-between">
                <!-- Left: Logo -->
                <div class="flex items-center">
                    <a href="/" class="text-2xl font-bold tracking-tight text-white uppercase">Ask<span class="text-secondary-fixed">Juthis</span></a>
                </div>

                <!-- Right: Back to site -->
                <div class="flex items-center space-x-4">
                    <a class="text-sm font-medium hover:text-secondary-fixed transition-colors text-white/60 px-3 py-2"
                        href="/">← Back to Site</a>
                    <button id="portal-sign-out-btn" class="hidden px-6 py-2 rounded-full border border-white/20 text-white/60 hover:text-white hover:border-white/40 transition-all font-bold text-sm" onclick="window.portalSignOut()">Sign Out</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Dynamic Content Injection Point -->
    <main id="app-content">
        <!-- Login, Portal, Wizard, Admin will be injected here -->
    </main>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="portal.js?v=1.0.0"></script>
</body>

</html>
